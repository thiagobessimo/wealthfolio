<!doctype html>
<html lang="en" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Wealthfolio</title>
    <!-- Splash styles live in an external file on purpose: an inline <style>
         here makes Tauri nonce the CSP style-src at runtime, which disables
         'unsafe-inline' and breaks runtime-injected styles (NumberFlow, sonner,
         addon CSS) in packaged builds. See public/splash.css. -->
    <link rel="stylesheet" href="/splash.css" />
  </head>

  <body class="overflow-x-hidden font-mono">
    <script>
      // Apply cached theme before first paint to prevent flash on login screen
      (function () {
        try {
          var theme = localStorage.getItem("wealthfolio-theme") || "system";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme === "dark"
                ? "dark"
                : "light";
          document.documentElement.classList.add(resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
